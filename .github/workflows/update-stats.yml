name: Update GitHub Stats
on:
  schedule:
    - cron: '0 0 * * *'  # runs once a day
  workflow_dispatch:      # lets you trigger it manually too

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cloc
        run: sudo apt-get update && sudo apt-get install -y cloc

      - name: Count lines of code across all repos
        id: loc
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          USERNAME="prant011"
          TOTAL=0
          mkdir -p /tmp/repos
          REPOS=$(gh repo list "$USERNAME" --limit 100 --json name,isFork -q '.[] | select(.isFork==false) | .name')
          for REPO in $REPOS; do
            git clone --depth 1 "https://github.com/$USERNAME/$REPO.git" "/tmp/repos/$REPO" 2>/dev/null || continue
            LINES=$(cloc "/tmp/repos/$REPO" --quiet --json 2>/dev/null | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('SUM',{}).get('code',0))" 2>/dev/null || echo 0)
            TOTAL=$((TOTAL + LINES))
            rm -rf "/tmp/repos/$REPO"
          done
          echo "total=$TOTAL" >> "$GITHUB_OUTPUT"

      - name: Update stats
        uses: actions/github-script@v7
        env:
          LOC: ${{ steps.loc.outputs.total }}
        with:
          script: |
            const fs = require('fs');
            const username = 'prant011';
            const loc = process.env.LOC || '0';

            const { data: user } = await github.rest.users.getByUsername({ username });
            const { data: repos } = await github.rest.repos.listForUser({ username, per_page: 100 });
            const stars = repos.reduce((sum, r) => sum + r.stargazers_count, 0);

            const { data: commitSearch } = await github.rest.search.commits({
              q: `author:${username}`
            });
            const totalCommits = commitSearch.total_count;

            let readme = fs.readFileSync('README.md', 'utf8');
            readme = readme.replace(/Repos:.*/, `Repos:                  ${repos.length}`);
            readme = readme.replace(/Commits:.*/, `Commits:                ${totalCommits}`);
            readme = readme.replace(/Stars:.*/, `Stars:                  ${stars}`);
            readme = readme.replace(/Followers:.*/, `Followers:              ${user.followers}`);
            readme = readme.replace(/Lines of Code:.*/, `Lines of Code:          ${loc}`);
            fs.writeFileSync('README.md', readme);

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --quiet && git diff --staged --quiet || git commit -m "Update GitHub stats"
          git push
