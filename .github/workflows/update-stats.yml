name: Update GitHub Stats
on:
  schedule:
    - cron: '0 0 * * *'  # runs once a day
  workflow_dispatch:      # lets you trigger it manually too

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update stats
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const { data: user } = await github.rest.users.getByUsername({ username: 'prant011' });
            const { data: repos } = await github.rest.repos.listForUser({ username: 'prant011', per_page: 100 });
            const stars = repos.reduce((sum, r) => sum + r.stargazers_count, 0);
            const block = `Repos:          ${repos.length}\nCommits:        N/A\nStars:          ${stars}\nFollowers:      ${user.followers}`;
            let readme = fs.readFileSync('README.md', 'utf8');
            readme = readme.replace(/<!--STATS:START-->[\s\S]*<!--STATS:END-->/, `<!--STATS:START-->\n${block}\n<!--STATS:END-->`);
            fs.writeFileSync('README.md', readme);
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --quiet && git diff --staged --quiet || git commit -m "Update stats"
          git push
